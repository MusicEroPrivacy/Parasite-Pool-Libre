    container_name: parasite-gateway
    restart: unless-stopped
    environment:
      # Parasite Pool
      UPSTREAM_HOST: parasite.wtf
      UPSTREAM_PORT: 42069
      LISTEN_PORT: 3333

      # Libre Node RPC - Fully configurable
      LIBRE_RPC_HOST: 192.168.50.103
      LIBRE_RPC_PORT: 8442
      LIBRE_RPC_USER: umbrel
      LIBRE_RPC_PASS: m4dTOS5_11fL4YY84kFDgUyBW-p1WzSXjD8wXd5a_Iw=

