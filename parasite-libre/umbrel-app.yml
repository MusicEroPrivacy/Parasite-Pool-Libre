manifestVersion: 1
id: parasite-libre
category: bitcoin
name: Parasite Libre
version: "1.0.0"
tagline: Parasite Pool proxy with LibreNode solo mining
description: >
  Solo mining proxy connecting to Parasite Pool (parasite.wtf:42069) with share validation through LibreNode RPC.

  Miner connection:
    - URL: `stratum+tcp://<your-host-ip>:3333`
    - Username: worker name (optional)
    - Password: anything

  Features:
    - Direct Parasite Pool upstream connection
    - Local LibreNode RPC validation
    - Stratum v1 protocol support
    - Multi-miner support
    - Auto-reconnect on failure
    - Detailed logging

  Setup:
    - LibreNode RPC: http://192.168.50.103:8442
    - User: umbrel
    - Password: (auto-configured)

