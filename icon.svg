<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <circle cx="50" cy="50" r="50" fill="#F7931A"/>
  
  <!-- Bitcoin symbol -->
  <g transform="translate(50, 50)">
    <text x="0" y="0" font-size="60" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">₿</text>
  </g>
  
  <!-- Pool indicator (bottom right) -->
  <circle cx="75" cy="75" r="12" fill="#1f1f1f" stroke="white" stroke-width="2"/>
  <text x="75" y="77" font-size="14" font-weight="bold" fill="white" text-anchor="middle">P</text>
</svg>
